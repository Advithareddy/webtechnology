<!DOCTYPE html>
<html>
<head>
    <title>Mobile Store</title>

    <style>
        body{
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align:center;
        }

        h1{
            color: navy;
            margin-top:20px;
        }

        table{
            border-collapse: collapse;
            width: 90%;
            margin: auto;
            background-color: white;
            box-shadow: 0px 0px 15px gray;
        }

        th{
            background-color: #4CAF50;
            color: white;
            padding: 12px;
        }

        td{
            padding: 12px;
            border: 1px solid gray;
        }

        img{
            width:120px;
            height:120px;
            border-radius:10px;
            transition:0.3s;
        }

        img:hover{
            transform:scale(1.1);
        }

        a{
            text-decoration:none;
            color:white;
            background-color:#2196F3;
            padding:8px 15px;
            border-radius:5px;
        }

        a:hover{
            background-color:#0b7dda;
        }
    </style>
</head>

<body>

    <h1>📱 MOBILE STORE</h1>

    <table>
        <tr>
            <th>S.NO</th>
            <th>PRODUCT</th>
            <th>IMAGE</th>
            <th>PRODUCT INFO</th>
            <th>FEATURES</th>
            <th>VIDEO</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Samsung Galaxy S22 5G</td>
            <td><img src="OIP.webp"></td>
            <td>
                <ol>
                    <li>16 GB RAM</li>
                    <li>50 MP Camera</li>
                </ol>
            </td>
            <td><a href="samsung.html">Details</a></td>
            <td><a href="https://www.youtube.com/watch?v=IPmRMqun3JE">Watch</a></td>
        </tr>

        <tr>
            <td>2</td>
            <td>Redmi</td>
            <td><img src="REDMI.webp"></td>
            <td>
                <ol>
                    <li>MIUI 13</li>
                    <li>64 GB Storage</li>
                </ol>
            </td>
            <td><a href="redmi.html">Details</a></td>
            <td><a href="https://www.youtube.com/watch?v=5ESEjyjQeGc">Watch</a></td>
        </tr>
    </table>

</body>
</html>
